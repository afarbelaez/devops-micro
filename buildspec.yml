version: 0.2

env:
  variables:
    STATIC_TOKEN: test-token
    JWT_SECRET_KEY: test-jwt-secret

phases:
  install:
    runtime-versions:
      python: 3.8
    commands:
      - pip install -r requirements.txt

  pre_build:
    commands:
      - python -m pytest tests/ -v --tb=short

  build:
    commands:
      - zip -r artifact.zip . -x "venv/*" -x ".git/*"

  post_build:
    commands:
      - echo "Build completado"

artifacts:
  files:
    - artifact.zip
