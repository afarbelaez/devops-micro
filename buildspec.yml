version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    AWS_ACCOUNT_ID: "248438642624"
    ECR_REPO_URI: 248438642624.dkr.ecr.us-east-1.amazonaws.com/blacklist-microservice
    CONTAINER_NAME: blacklist-container
    STATIC_TOKEN: test-token
    JWT_SECRET_KEY: test-jwt-secret

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Ejecutando pruebas unitarias..."
      - python -m pytest tests/ -v --tb=short
      - echo "Login a Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-8)
      - echo "IMAGE_TAG=$IMAGE_TAG"

  build:
    commands:
      - echo "Construyendo imagen Docker para linux/amd64..."
      - docker build --platform linux/amd64 -t $ECR_REPO_URI:$IMAGE_TAG -t $ECR_REPO_URI:latest .
      - echo "Generando imageDetail.json..."
      - printf '{"ImageURI":"%s:%s"}' $ECR_REPO_URI $IMAGE_TAG > imageDetail.json

  post_build:
    commands:
      - echo "Push de imagen a ECR..."
      - docker push $ECR_REPO_URI:$IMAGE_TAG
      - docker push $ECR_REPO_URI:latest
      - echo "Generando imagedefinitions.json..."
      - printf '[{"name":"%s","imageUri":"%s:%s"}]' $CONTAINER_NAME $ECR_REPO_URI $IMAGE_TAG > imagedefinitions.json
      - echo "Build completado. Imagen $ECR_REPO_URI:$IMAGE_TAG"

artifacts:
  files:
    - imagedefinitions.json
    - imageDetail.json
    - appspec.json
    - taskdef.json
